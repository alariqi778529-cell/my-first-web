<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Ball Challenge</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --ig-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            --ig-blue: #0095f6;
            --dark-bg: #000000;
            --chat-bubble-me: #373737;
            --chat-bubble-them: #262626;
        }

        body, html { margin: 0; padding: 0; background: var(--dark-bg); color: white; height: 100%; overflow: hidden; font-family: -apple-system, system-ui, sans-serif; }

        /* --- واجهة اللعبة الاحترافية --- */
        #game-interface { position: fixed; inset: 0; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; }
        #gameCanvas { background: #050505; border-radius: 15px; border: 2px solid #333; touch-action: none; width: 90vw; height: 60vh; }
        .game-stats { font-size: 24px; font-weight: bold; margin-bottom: 20px; color: #0f0; font-family: 'Courier New', monospace; }

        /* الزر السري المخفي (أعلى اليسار) */
        #secret-trigger { position: absolute; top: 0; left: 0; width: 60px; height: 60px; z-index: 100; opacity: 0; }

        /* --- واجهة إنستجرام (المحادثة) --- */
        #chat-platform { display: none; position: fixed; inset: 0; background: var(--dark-bg); flex-direction: column; z-index: 30; }
        
        /* الهيدر */
        .chat-header { height: 60px; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #262626; justify-content: space-between; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--ig-gradient); padding: 2px; }
        .avatar img { width: 100%; height: 100%; border-radius: 50%; background: #000; }
        .status-text { display: flex; flex-direction: column; }
        .status-text .name { font-weight: bold; font-size: 14px; }
        .status-text .status { font-size: 11px; color: #a8a8a8; }

        /* ساحة الرسائل */
        #messages-container { flex: 1; overflow-y: auto; padding: 20px 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 75%; padding: 10px 16px; border-radius: 22px; font-size: 14px; line-height: 1.4; position: relative; }
        .me { align-self: flex-end; background: var(--ig-blue); color: white; border-bottom-right-radius: 4px; }
        .them { align-self: flex-start; background: #262626; color: white; border-bottom-left-radius: 4px; }
        .time { font-size: 9px; color: #a8a8a8; margin-top: 4px; align-self: inherit; }

        /* منطقة الإدخال */
        .input-area { padding: 10px 15px; display: flex; align-items: center; gap: 15px; border-top: 1px solid #262626; margin-bottom: 10px; }
        .input-wrapper { flex: 1; background: #262626; border-radius: 25px; display: flex; align-items: center; padding: 5px 15px; }
        .input-wrapper input { background: transparent; border: none; color: white; flex: 1; padding: 8px 0; outline: none; }
        .send-btn { color: var(--ig-blue); font-weight: bold; font-size: 14px; cursor: pointer; }

        #pass-screen { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="secret-trigger" onclick="showPass()"></div>

    <div id="game-interface">
        <div class="game-stats">SCORE: <span id="score">0</span></div>
        <canvas id="gameCanvas"></canvas>
        <p style="color: #666; margin-top: 20px;">حرك المضرب لصد الكرة</p>
    </div>

    <div id="pass-screen">
        <div style="text-align: center;">
            <i class="fab fa-instagram" style="font-size: 50px; margin-bottom: 20px; background: var(--ig-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i>
            <br>
            <input type="password" id="passInput" placeholder="كلمة المرور" style="padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; width: 200px;">
            <br>
            <button onclick="checkPass()" style="margin-top: 15px; padding: 10px 40px; border-radius: 8px; border: none; background: var(--ig-blue); color: white; font-weight: bold;">دخول</button>
        </div>
    </div>

    <div id="chat-platform">
        <div class="chat-header">
            <div class="user-info">
                <i class="fas fa-chevron-right" onclick="location.reload()"></i>
                <div class="avatar"></div>
                <div class="status-text">
                    <span class="name">المساحة الخاصة</span>
                    <span class="status">متصل الآن</span>
                </div>
            </div>
            <div class="header-icons">
                <i class="fas fa-phone" style="margin-left: 15px;"></i>
                <i class="fas fa-video"></i>
            </div>
        </div>
        <div id="messages-container"></div>
        <div class="input-area">
            <i class="fas fa-camera" style="font-size: 20px;"></i>
            <div class="input-wrapper">
                <input type="text" id="msgInput" placeholder="مراسلة...">
            </div>
            <span class="send-btn" onclick="sendMsg()">إرسال</span>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <script>
        // --- إعدادات Firebase ---
        const firebaseConfig = {
            apiKey: "AIzaSyA291VBmybm4gvrZM8Z-26scGgFTK9wn-c",
            authDomain: "myblatfrom.firebaseapp.com",
            projectId: "myblatfrom",
            storageBucket: "myblatfrom.firebasestorage.app",
            messagingSenderId: "1084981629473",
            appId: "1:1084981629473:web:c211330b27e6d5a5940960"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const myID = "User1"; // في نسخة حبيبتك خليها User2

        // --- منطق اللعبة (تم الإصلاح للجوال) ---
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth * 0.9;
        canvas.height = window.innerHeight * 0.6;

        let ball = { x: canvas.width/2, y: 30, dx: 4, dy: 4, radius: 10 };
        let paddle = { w: 100, h: 15, x: (canvas.width-100)/2 };
        let score = 0;

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // الكرة
            ctx.fillStyle = "#0f0"; ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2); ctx.fill();
            // المضرب
            ctx.fillStyle = "#fff"; ctx.fillRect(paddle.x, canvas.height - 20, paddle.w, paddle.h);
            
            ball.x += ball.dx; ball.y += ball.dy;
            if(ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) ball.dx = -ball.dx;
            if(ball.y - ball.radius < 0) ball.dy = -ball.dy;
            if(ball.y + ball.radius > canvas.height - 20 && ball.x > paddle.x && ball.x < paddle.x + paddle.w) {
                ball.dy = -ball.dy; score++; document.getElementById("score").innerText = score;
                ball.dx *= 1.05; ball.dy *= 1.05; // زيادة الصعوبة
            }
            if(ball.y > canvas.height) { ball.x = canvas.width/2; ball.y = 30; ball.dx = 4; ball.dy = 4; score = 0; document.getElementById("score").innerText = 0; }
            requestAnimationFrame(draw);
        }
        canvas.addEventListener("touchmove", (e) => {
            let touchX = e.touches[0].clientX - canvas.offsetLeft;
            paddle.x = touchX - paddle.w/2;
            e.preventDefault();
        }, {passive: false});
        draw();

        // --- الوظائف السرية ---
        function showPass() { document.getElementById('pass-screen').style.display = 'flex'; }
        function checkPass() {
            if(document.getElementById('passInput').value === "2005223") {
                document.getElementById('pass-screen').style.display = 'none';
                document.getElementById('game-interface').style.display = 'none';
                document.getElementById('chat-platform').style.display = 'flex';
                loadMessages();
            } else { location.reload(); }
        }

        // --- نظام الدردشة الاحترافي ---
        function sendMsg() {
            const val = document.getElementById('msgInput').value;
            if(!val) return;
            db.collection("chats").add({
                text: val,
                sender: myID,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                timeStr: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                seen: false
            });
            document.getElementById('msgInput').value = "";
        }

        function loadMessages() {
            db.collection("chats").orderBy("timestamp", "asc").onSnapshot(snap => {
                const container = document.getElementById('messages-container');
                container.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const isMe = d.sender === myID;
                    const msgHtml = `
                        <div class="msg ${isMe ? 'me' : 'them'}">
                            ${d.text}
                            <div class="time">${d.timeStr} ${isMe && d.seen ? '• مشاهَد' : ''}</div>
                        </div>`;
                    container.innerHTML += msgHtml;
                    if(!isMe && !d.seen) db.collection("chats").doc(doc.id).update({seen: true});
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        // إغلاق عند الخروج
        document.addEventListener("visibilitychange", () => { if(document.hidden) location.reload(); });
    </script>
</body>
</html>
