<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER VAULT | الخزنة المشفرة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <style>
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow-x: hidden;
        }

        /* خلفية مصفوفة الرموز (Matrix Background) */
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.3;
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #0f0;
            box-shadow: 0 0 15px #0f0;
            background: rgba(0, 20, 0, 0.9);
        }

        h1 { text-align: center; text-shadow: 0 0 10px #0f0; }

        input, button, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #000;
            border: 1px solid #0f0;
            color: #0f0;
            outline: none;
        }

        button {
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 20px #0f0;
        }

        .file-list {
            margin-top: 20px;
            border-top: 1px solid #0f0;
            padding-top: 10px;
        }

        .status { font-size: 0.8em; color: #888; }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div class="container">
        <h1>[ CYBER-VAULT v1.0 ]</h1>
        
        <div id="auth-section">
            <input type="email" id="email" placeholder="البريد الإلكتروني">
            <input type="password" id="password" placeholder="كلمة المرور">
            <button onclick="login()">الدخول إلى النظام</button>
            <button onclick="register()">إنشاء حساب جديد</button>
        </div>

        <div id="vault-section" style="display:none;">
            <h3>أهلاً بك أيها المستخدم.. النظام جاهز</h3>
            <input type="password" id="master-key" placeholder="أدخل مفتاح التشفير (Master Key) - هام جداً">
            <hr>
            <textarea id="secret-note" placeholder="اكتب نصاً سرياً لتشفيره وحفظه..."></textarea>
            <button onclick="saveNote()">تشفير وحفظ النص</button>
            
            <input type="file" id="file-input">
            <button onclick="uploadFile()">تشفير ورفع ملف</button>
            
            <div class="file-list" id="data-display">
                </div>
            <button onclick="logout()">تسجيل الخروج</button>
        </div>
    </div>

    <script>
        // إعدادات Firebase التي أرسلتها أنت
        const firebaseConfig = {
            apiKey: "AIzaSyA291VBmybm4gvrZM8Z-26scGgFTK9wn-c",
            authDomain: "myblatfrom.firebaseapp.com",
            projectId: "myblatfrom",
            storageBucket: "myblatfrom.firebasestorage.app",
            messagingSenderId: "1084981629473",
            appId: "1:1084981629473:web:c211330b27e6d5a5940960",
            measurementId: "G-VZK3TTRM75"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        // --- وظائف الأنيميشن (Matrix) ---
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const chars = "01ABCDEFGHIJKLMNOPQRSTUVWXYZｦｱｳｴｵｶｷｸｹｺ";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = chars.charAt(Math.floor(Math.random() * chars.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        // --- وظائف الحماية والتشفير ---

        // الدخول
        function login() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(e, p)
                .then(() => { showVault(); })
                .catch(err => alert("خطأ في الدخول: " + err.message));
        }

        function showVault() {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('vault-section').style.display = 'block';
            loadData();
        }

        // تشفير وحفظ نص
        async function saveNote() {
            const note = document.getElementById('secret-note').value;
            const key = document.getElementById('master-key').value;
            if(!key) return alert("يجب إدخال مفتاح التشفير أولاً!");

            // تشفير النص بـ AES
            const encryptedNote = CryptoJS.AES.encrypt(note, key).toString();

            await db.collection("vaults").add({
                userId: auth.currentUser.uid,
                data: encryptedNote,
                type: 'text',
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("تم التشفير والحفظ في السحابة بنجاح!");
            loadData();
        }

        // استعادة البيانات وفك التشفير
        async function loadData() {
            const key = document.getElementById('master-key').value;
            const display = document.getElementById('data-display');
            display.innerHTML = "جاري جلب البيانات المشفرة...";

            db.collection("vaults")
              .where("userId", "==", auth.currentUser.uid)
              .orderBy("timestamp", "desc")
              .onSnapshot(snapshot => {
                  display.innerHTML = "";
                  snapshot.forEach(doc => {
                      const item = doc.data();
                      let content = "";
                      if (key) {
                          try {
                              const bytes = CryptoJS.AES.decrypt(item.data, key);
                              content = bytes.toString(CryptoJS.enc.Utf8) || "[مفتاح خطأ]";
                          } catch (e) { content = "[فشل فك التشفير]"; }
                      } else {
                          content = "[أدخل المفتاح لرؤية المحتوى]";
                      }
                      display.innerHTML += `<div style='border:1px dotted #0f0; padding:5px; margin-bottom:5px;'>
                        <small>${item.type.toUpperCase()}:</small> ${content}
                      </div>`;
                  });
              });
        }

        function logout() { auth.signOut(); location.reload(); }
    </script>
</body>
</html>
