<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحدي صيد الكرات Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; touch-action: manipulation; }
        .ball { transition: all 0.2s ease-out; cursor: pointer; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans select-none">

<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- المؤثرات الصوتية (روابط مباشرة جاهزة) ---
    // يمكنك استبدال هذه الروابط بملفات .mp3 خاصة بك لاحقاً
    const soundUrls = {
        pop: "https://www.soundjay.com/buttons/sounds/button-10.mp3", // صوت صيد الكرة
        miss: "https://www.soundjay.com/buttons/sounds/button-11.mp3", // صوت تفويت الكرة
        fail: "https://www.soundjay.com/communication/sounds/fail-buzzer-02.mp3", // صوت الباسورد الخطأ
        success: "https://www.soundjay.com/buttons/sounds/button-3.mp3" // صوت الباسورد الصح
    };

    const GameApp = () => {
        const [gameState, setGameState] = useState('playing'); // playing, login, chatting
        const [score, setScore] = useState(0);
        const [ballPosition, setBallPosition] = useState({ top: 50, left: 50 });
        const [password, setPassword] = useState('');
        const [loginError, setLoginError] = useState('');
        const audioRefs = useRef({});

        // تحميل الأصوات عند بدء التطبيق
        useEffect(() => {
            Object.keys(soundUrls).forEach(key => {
                audioRefs.current[key] = new Audio(soundUrls[key]);
                audioRefs.current[key].load();
            });
        }, []);

        const playSound = (soundName) => {
            if (audioRefs.current[soundName]) {
                audioRefs.current[soundName].currentTime = 0; // إعادة الصوت من البداية
                audioRefs.current[soundName].play().catch(e => console.log("Sound play blocked: ", e));
            }
        };

        const moveBall = () => {
            // تحريك الكرة لمكان عشوائي (تجنب الزاوية اليسرى العليا قليلاً)
            const newTop = Math.random() * 80 + 10; // بين 10% و 90%
            const newLeft = Math.random() * 80 + 10;
            setBallPosition({ top: newTop, left: newLeft });
        };

        const handleBallClick = () => {
            if (gameState !== 'playing') return;
            playSound('pop');
            setScore(prev => prev + 10);
            moveBall();
        };

        // تفعيل اللعبة بالتحريك التلقائي كل فترة
        useEffect(() => {
            if (gameState !== 'playing') return;
            const timer = setInterval(() => {
                // playSound('miss'); // اختياري: تشغيل صوت إذا فاتتك الكرة
                moveBall();
            }, 1200); // تغيير السرعة من هنا
            return () => clearInterval(timer);
        }, [gameState]);

        // --- التعامل مع الزر المخفي والباسورد ---
        const handleSecretTrigger = () => {
            setGameState('login');
            setPassword('');
            setLoginError('');
        };

        const handleLogin = () => {
            if (password === '1234') { // *** الباسورد السري هنا (غيّره لاحقاً) ***
                playSound('success');
                setGameState('chatting');
            } else {
                playSound('fail');
                setLoginError('كلمة المرور غير صحيحة!');
                setTimeout(() => setLoginError(''), 2000);
            }
        };

        return (
            <div className="relative h-screen w-screen p-4 overflow-hidden">
                
                {/* --- 1. الزر المخفي (في الزاوية اليسرى العليا) --- */}
                <div 
                    onClick={handleSecretTrigger} 
                    className="absolute top-0 left-0 w-16 h-16 bg-red-500 opacity-0 active:opacity-20 cursor-pointer z-50"
                    title="المنطقة السرية"
                ></div>

                {/* --- 2. واجهة اللعبة (التمويه) --- */}
                {gameState === 'playing' && (
                    <div className="h-full flex flex-col items-center">
                        <header className="w-full flex justify-between items-center mb-8 pb-4 border-b border-gray-700">
                            <h1 className="text-xl font-bold text-yellow-400">تحدي صيد الكرات Pro</h1>
                            <div className="bg-gray-800 p-2 px-4 rounded-full">النقاط: <span className="text-green-400 font-mono text-xl">{score}</span></div>
                        </header>
                        
                        <div className="relative flex-grow w-full bg-gray-800 rounded-lg shadow-inner overflow-hidden border border-gray-700">
                            <div 
                                onClick={handleBallClick}
                                className="ball absolute w-12 h-12 bg-red-500 rounded-full shadow-lg border-4 border-white"
                                style={{ top: `${ballPosition.top}%`, left: `${ballPosition.left}%` }}
                            ></div>
                        </div>
                    </div>
                )}

                {/* --- 3. نافذة الباسورد المخفية --- */}
                {gameState === 'login' && (
                    <div className="absolute inset-0 bg-black/90 flex flex-col items-center justify-center z-40 p-6 backdrop-blur-sm">
                        <div className="bg-gray-800 p-8 rounded-2xl shadow-2xl border border-gray-700 w-full max-w-sm text-center">
                            <h2 className="text-3xl font-extrabold mb-8 text-yellow-300">النظام السري</h2>
                            {loginError && <p className="text-red-400 mb-4 font-bold">{loginError}</p>}
                            <input 
                                type="password" 
                                value={password}
                                onChange={(e) => setPassword(e.target.value)}
                                placeholder="أدخل كود الدخول"
                                className="w-full p-4 mb-6 bg-gray-900 rounded-lg border border-gray-600 text-center text-2xl font-mono tracking-widest text-white focus:ring-2 focus:ring-yellow-400 focus:outline-none"
                                maxLength={4}
                            />
                            <div className="flex gap-4">
                                <button onClick={() => setGameState('playing')} className="w-1/2 p-3 bg-gray-700 rounded-lg text-gray-300 font-bold hover:bg-gray-600 transition">إلغاء</button>
                                <button onClick={handleLogin} className="w-1/2 p-3 bg-yellow-500 rounded-lg text-gray-900 font-bold hover:bg-yellow-400 transition">دخول</button>
                            </div>
                        </div>
                    </div>
                )}

                {/* --- 4. واجهة المنصة السرية (قيد الإنشاء) --- */}
                {gameState === 'chatting' && (
                    <div className="h-full flex flex-col items-center justify-center bg-gray-950 p-6 text-center">
                        <h1 className="text-4xl font-extrabold text-green-400 mb-6">تم الدخول بنجاح! ✅</h1>
                        <p className="text-xl text-gray-300 mb-10">هذه هي واجهة المنصة السرية (قيد الإنشاء).</p>
                        <p className="text-lg text-gray-400 mb-10">في الخطوة القادمة، سنربطها بتليجرام لإرسال واستقبال الرسائل.</p>
                        <button 
                            onClick={() => setGameState('playing')} 
                            className="p-4 px-8 bg-red-600 rounded-full font-bold text-lg hover:bg-red-500 transition shadow-lg"
                        >
                            خروج وإعادة قفل
                        </button>
                    </div>
                )}

            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<GameApp />);
</script>
</body>
</html>
