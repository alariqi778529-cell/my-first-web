<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Security Profile</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            border: 1px solid #00ff41;
            padding: 40px;
            box-shadow: 0 0 20px #00ff41;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.8);
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; color: #fff; }
        .status { color: #00ff41; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>SYSTEM ACTIVE</h1>
        <p>مرحباً بك في مشروعي الأول</p>
        <p>تخصص: <span style="color: #00ff41;">الأمن السيبراني</span></p>
        <div class="status">_جاري الاتصال بالسيرفر...</div>
    </div>
</body>
</html>
